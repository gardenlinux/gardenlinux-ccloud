{
  "ignition": {
    "version": "3.6.0"
  },
  "storage": {
    "files": [
      {
        "overwrite": true,
        "path": "/etc/hostname",
        "contents": {
          "source": "data:,node001-test%0A"
        },
        "mode": 420
      },
      {
        "overwrite": true,
        "path": "/etc/multipath.conf",
        "contents": {
          "compression": "",
          "source": "data:;base64,"
        },
        "mode": 420
      },
      {
        "path": "/opt/persist/hugepages.env",
        "mode": 420,
        "contents": {
          "source": "data:,NON_HUGEPAGES_PM=1000%0A"
        }
      },
      {
        "overwrite": true,
        "path": "/etc/ssh/sshd_config",
        "contents": {
          "source": "data:;base64,"
        },
        "mode": 384
      }
    ],
    "links": [
      {
        "path": "/etc/systemd/system/multi-user.target.wants/ssh.service",
        "target": "/lib/systemd/system/ssh.service",
        "hard": false,
        "overwrite": true
      }
    ]
  }
}
